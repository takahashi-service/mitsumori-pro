<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>見積もりPRO 完全版v2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#eef2f5;padding:15px;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input{width:100%;margin:5px 0;padding:8px;}
button{padding:12px;margin-top:8px;width:100%;border:none;border-radius:8px;}
.calc{background:#007bff;color:#fff;}
.pdf{background:#28a745;color:#fff;}
.result{white-space:pre-line;background:#111;color:#0f0;padding:10px;border-radius:10px;}
@media print{
body *{visibility:hidden;}
#printArea, #printArea *{visibility:visible;}
#printArea{position:absolute;top:0;left:0;width:100%;}
}
</style>
</head>

<body>

<h1>🚚 見積もりPRO</h1>

<div class="card">
<h2>顧客情報</h2>
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="address" placeholder="住所">

<h2>希望日</h2>
<input type="date" id="date1">
<input type="date" id="date2">
<input type="date" id="date3">
</div>

<div class="card">
<h2>条件</h2>
<input id="distance" type="number" placeholder="距離km">
<input id="highway" type="number" placeholder="高速代">
</div>

<div class="card">
<h2>家財リスト</h2>

<input id="box" type="number" placeholder="ダンボール">

<input id="fridgeSmall" type="number" placeholder="冷蔵庫 小">
<input id="fridgeMedium" type="number" placeholder="冷蔵庫 中">
<input id="fridgeLarge" type="number" placeholder="冷蔵庫 大">

<input id="washerNormal" type="number" placeholder="洗濯機">
<input id="washerDrum" type="number" placeholder="ドラム式">

<input id="tvSmall" type="number" placeholder="テレビ 小">
<input id="tvMedium" type="number" placeholder="テレビ 中">
<input id="tvLarge" type="number" placeholder="テレビ 大">

<input id="cupboardSmall" type="number" placeholder="食器棚 小">
<input id="cupboardMedium" type="number" placeholder="食器棚 中">
<input id="cupboardLarge" type="number" placeholder="食器棚 大">

<input id="bedSingle" type="number" placeholder="ベッド シングル">
<input id="bedSemi" type="number" placeholder="ベッド セミダブル">
<input id="bedDouble" type="number" placeholder="ベッド ダブル">
<input id="bedQueen" type="number" placeholder="ベッド クイーン">
<input id="bedKing" type="number" placeholder="ベッド キング">

<input id="matSingle" type="number" placeholder="マットレス シングル">
<input id="matSemi" type="number" placeholder="マットレス セミダブル">
<input id="matDouble" type="number" placeholder="マットレス ダブル">
<input id="matQueen" type="number" placeholder="マットレス クイーン">
<input id="matKing" type="number" placeholder="マットレス キング">

<input id="tableDining" type="number" placeholder="ダイニングテーブル">
<input id="tableLow" type="number" placeholder="ローテーブル">
<input id="deskGaming" type="number" placeholder="ゲーミングデスク">

<input id="chairGaming" type="number" placeholder="ゲーミングチェア">
<input id="chair" type="number" placeholder="チェア">
<input id="stool" type="number" placeholder="椅子">

<input id="sofa" type="number" placeholder="ソファ">

<input id="bikeSmall" type="number" placeholder="自転車 小">
<input id="bikeLarge" type="number" placeholder="自転車 大">

</div>

<button class="calc" onclick="calc()">計算</button>
<button class="pdf" onclick="printPDF()">PDF作成</button>

<div id="result" class="result"></div>
<div id="printArea"></div>

<hr>
<div id="unList"></div>
<div id="conList"></div>

<script>

let customerId = Date.now();

function val(id){return Number(document.getElementById(id).value)||0;}

function isWeekend(d){
if(!d) return true;
let day = new Date(d).getDay();
return day===0||day===6;
}

function calc(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

let date1 = document.getElementById("date1").value;
let date2 = document.getElementById("date2").value;
let date3 = document.getElementById("date3").value;

if(date1 && !isWeekend(date1)){
alert("第1希望日は土日のみ対応です");
}

let distance = val("distance");

// 立米
let volume =
val("box")*0.1 +
val("fridgeSmall")*0.3 + val("fridgeMedium")*0.5 + val("fridgeLarge")*0.8 +
val("washerNormal")*0.3 + val("washerDrum")*0.6 +
val("tvSmall")*0.2 + val("tvMedium")*0.3 + val("tvLarge")*0.5 +
val("cupboardSmall")*0.5 + val("cupboardMedium")*0.8 + val("cupboardLarge")*1.2 +
val("bedSingle")*1.0 + val("bedSemi")*1.2 + val("bedDouble")*1.4 + val("bedQueen")*1.6 + val("bedKing")*1.8 +
val("matSingle")*0.5 + val("matSemi")*0.6 + val("matDouble")*0.7 + val("matQueen")*0.8 + val("matKing")*1.0 +
val("tableDining")*1.0 + val("tableLow")*0.4 + val("deskGaming")*0.8 +
val("chairGaming")*0.4 + val("chair")*0.3 + val("stool")*0.2 +
val("sofa")*1.5 +
val("bikeSmall")*0.5 + val("bikeLarge")*0.8;

let fridgeTotal = val("fridgeSmall")+val("fridgeMedium")+val("fridgeLarge");

let isSmall = (volume<=4 && fridgeTotal==0);

// 単価
let perKm = distance<=20?200:distance<=40?250:300;
let volumeUnit = volume<5?2000:volume<10?1800:1500;

let base=30000;
let sales;
let explanation="";

if(isSmall){
sales=25000;
explanation="小口特別プラン";
}else if(volume<=4.5){
sales=28000;
explanation="小口拡張プラン";
}else{
sales=base+(distance*perKm)+(volume*volumeUnit);
explanation="通常プラン";
}

let total=Math.ceil(sales*1.1);

let text=
explanation+"\n\n"+
"税込："+total.toLocaleString()+"円\n"+
"距離："+distance+"km\n"+
"立米："+volume.toFixed(2)+"\n\n"+
"希望日①："+(date1||"-")+"\n"+
"希望日②："+(date2||"-")+"\n"+
"希望日③："+(date3||"-")+"\n\n"+
"※この価格は本日限定です";

document.getElementById("result").innerText=text;

// 保存
let lastSavedId=localStorage.getItem("lastSavedId");

if(name && phone && lastSavedId!=customerId){

let un=JSON.parse(localStorage.getItem("list_uncontracted")||"[]");

un.push({
id:Date.now(),
name:name,
phone:phone,
price:Number(total)||0,
date:new Date().toLocaleDateString()
});

if(un.length>100){un.shift();}

localStorage.setItem("list_uncontracted",JSON.stringify(un));
localStorage.setItem("lastSavedId",customerId);

customerId=Date.now();
}

renderUncontracted();
renderContracted();

}

function printPDF(){

calc();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let date1 = document.getElementById("date1").value;
let date2 = document.getElementById("date2").value;
let date3 = document.getElementById("date3").value;

let today=new Date().toLocaleDateString();
let text=document.getElementById("result").innerText;

printArea.innerHTML=`
<div style="padding:20px;font-family:sans-serif;">
<h1 style="text-align:center;">見積書</h1>

<div style="display:flex;justify-content:space-between;">
<div>
顧客名：${name}<br>
住所：${address}<br>
電話：${phone}
</div>
<div style="text-align:right;">
見積日：${today}<br>
有効期限：${today}
</div>
</div>

<hr>

希望日①：${date1||"-"}<br>
希望日②：${date2||"-"}<br>
希望日③：${date3||"-"}

<hr>

<pre>${text}</pre>

<hr>

<div style="color:red;font-weight:bold;">
※この価格は本日限定です
</div>

<div style="display:flex;justify-content:space-between;margin-top:30px;">
<div>担当者：髙橋 爽</div>

<div style="text-align:right;">
<div style="border:3px solid red;border-radius:50%;padding:10px;display:inline-block;transform:rotate(-10deg);">
見積済
</div>
<br><br>
万事屋そうちゃん
</div>
</div>

</div>
`;

window.print();
}

// 成約・一覧（そのまま）
function contract(id){
let un=JSON.parse(localStorage.getItem("list_uncontracted")||"[]");
let con=JSON.parse(localStorage.getItem("list_contracted")||"[]");
let item=un.find(x=>x.id==id);
if(!item)return;
un=un.filter(x=>x.id!=id);
con.push(item);
localStorage.setItem("list_uncontracted",JSON.stringify(un));
localStorage.setItem("list_contracted",JSON.stringify(con));
renderUncontracted();
renderContracted();
}

function renderUncontracted(){
let un=JSON.parse(localStorage.getItem("list_uncontracted")||"[]");
let html="<h2>未成約</h2>";
un.forEach(x=>{
html+=`<div class="card">${x.name} ${x.price.toLocaleString()}円<button onclick="contract('${x.id}')">成約</button></div>`;
});
unList.innerHTML=html;
}

function renderContracted(){
let con=JSON.parse(localStorage.getItem("list_contracted")||"[]");
let total=0;
let html="<h2>成約</h2>";
con.forEach(x=>{
total+=x.price;
html+=`<div class="card">${x.name} ${x.price.toLocaleString()}円</div>`;
});
html+=`<h3>売上：${total.toLocaleString()}円</h3>`;
conList.innerHTML=html;
}

renderUncontracted();
renderContracted();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>見積もりPRO V10.6</title>

<style>
body{font-family:sans-serif;background:#eef2f5;padding:15px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0}
button{border:none;border-radius:8px}
.calc{background:#007bff;color:#fff}
.save{background:#ffc107}
.line{background:#06c755;color:#fff}
.pdf{background:#28a745;color:#fff}
.discount{background:#dc3545;color:#fff}
.discount.active{background:#a30000}
.copy{background:#17a2b8;color:#fff}
.result{white-space:pre-line;background:#111;color:#0f0;padding:10px;border-radius:10px}
.small{font-size:12px;color:#555}
</style>
</head>

<body>

<h1>🚚 見積もりPRO V10.6</h1>

<div class="card">
<h2>顧客情報</h2>
<input id="customerId" readonly placeholder="顧客番号">
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">

積込
<input id="addressFrom">
<button class="copy" onclick="copyText('addressFrom')">コピー</button>

降ろし地
<input id="addressTo">
<button class="copy" onclick="copyText('addressTo')">コピー</button>
</div>

<div class="card">
<h2>日程</h2>
<input id="date1" type="date">
<input id="date2" type="date">
<input id="date3" type="date">
<input id="fixedDate" type="datetime-local">
<div class="small">未入力の場合は「未設定」と表示されます</div>
<a href="https://calendly.com/alve-takahashi/30min" target="_blank">カレンダリーで日程調整</a>
</div>

<div class="card">
<h2>家財</h2>
ダンボール<input id="box" type="number">
冷蔵庫 小<input id="fridgeS">
冷蔵庫 中<input id="fridgeM">
冷蔵庫 大<input id="fridgeL">
洗濯機<input id="washer">
ドラム式<input id="drum">
テレビ 小<input id="tvS">
テレビ 大<input id="tvL">
ソファ2人<input id="sofa2">
ソファ3人<input id="sofa3">
シングルベッド<input id="bedS">
セミダブルベッド<input id="bedSD">
ダブルベッド<input id="bedD">
シングルマットレス<input id="matS">
セミダブル<input id="matSD">
ダブル<input id="matD">
ダイニングテーブル<input id="table">
ゲーミングチェア<input id="gaming">
パイプハンガー<input id="hanger">
照明<input id="light">
自転車 中<input id="bikeM">
自転車 大<input id="bikeL">
</div>

<div class="card">
距離(km)
<input id="distance" type="number">
</div>

<button id="discountBtn" class="discount" onclick="toggleDiscount()">即決割引 -5000円</button>
<button class="calc" onclick="calc()">計算</button>
<button class="save" onclick="save()">保存</button>
<button class="line" onclick="sendLINE()">LINE送信</button>
<button class="pdf" onclick="printPDFPro()">PDF出力</button>

<div id="result" class="result"></div>

<hr>
<div id="conList"></div>
<div id="doneList"></div>
<div id="total"></div>

<script>

let discount=false;

function generateId(){
let d=new Date();
return d.getFullYear()+(""+(d.getMonth()+1)).padStart(2,"0")+(""+d.getDate()).padStart(2,"0")
+"-"+Math.floor(Math.random()*1000);
}

function copyText(id){
navigator.clipboard.writeText(document.getElementById(id).value);
alert("コピーOK");
}

function v(id){return Number(document.getElementById(id).value)||0}
function t(id){return document.getElementById(id).value||"未設定"}

function toggleDiscount(){
discount=!discount;
document.getElementById("discountBtn").classList.toggle("active",discount);
calc();
}

function volume(){
return (
v("box")*0.1 +
v("fridgeS")*0.6 +
v("fridgeM")*1 +
v("fridgeL")*1.2 +
v("washer")*0.5 +
v("drum")*0.8 +
v("tvS")*0.3 +
v("tvL")*0.5 +
v("sofa2")*1 +
v("sofa3")*1.5 +
v("bedS")*1 +
v("bedSD")*1.2 +
v("bedD")*1.4 +
v("matS")*0.5 +
v("matSD")*0.7 +
v("matD")*0.9 +
v("table")*1 +
v("gaming")*0.3 +
v("hanger")*0.3 +
v("light")*0.1 +
v("bikeM")*0.5 +
v("bikeL")*0.7
);
}

function calc(){

if(!t("name") || !t("phone")){
alert("名前と電話番号を入力してください");
return;
}

if(!document.getElementById("customerId").value){
document.getElementById("customerId").value=generateId();
}

let vol=volume();
let d=v("distance");

let plan="";
let price=0;

if(vol<=3){plan="小口特別";price=25000;}
else if(vol<=4.5){plan="小口拡張";price=25000+((vol-3)*2000);}
else{plan="通常";price=30000+(vol*2000)+(d*200);}

let piston=Math.floor(vol/10)*15000;
price+=piston;

if(discount){price-=5000;}
price=Math.floor(price/1000)*1000;

let today=new Date().toLocaleDateString();

result.innerText=
"【見積書】\n\n"+
"万事屋そうちゃん\n担当者名：髙橋 爽\n作成日："+today+"\n\n"+
"顧客番号："+t("customerId")+"\n"+
"名前："+t("name")+"\n"+
"電話："+t("phone")+"\n"+
"積込："+t("addressFrom")+"\n"+
"降ろし："+t("addressTo")+"\n\n"+
"希望日："+t("date1")+" / "+t("date2")+" / "+t("date3")+"\n"+
"予約確定："+t("fixedDate")+"\n\n"+
"立米："+vol.toFixed(2)+"\n"+
"距離："+d+"km\n"+
"プラン："+plan+"\n"+
"金額："+price.toLocaleString()+"円\n"+
( piston>0 ? "ピストン料金："+piston.toLocaleString()+"円\n" : "" )+
"\n※10㎥を超える場合はピストン（往復）料金が発生します\n"+
"\n本日中のお申込みで-5,000円可能です";

}

function printPDFPro(){
let w=window.open("");
w.document.write("<pre>"+result.innerText+"</pre>");
w.print();
}

function getPrice(){
let m=result.innerText.match(/金額：(.*)円/);
return m?Number(m[1].replace(/,/g,"")):0;
}

function save(){
if(!result.innerText){
alert("先に計算してください");
return;
}

let discountVal=prompt("値引き額を入力（未成約用）",0);
discountVal=Number(discountVal)||0;

let finalPrice=getPrice()-discountVal;
if(finalPrice<0) finalPrice=0;

let list=JSON.parse(localStorage.getItem("con")||"[]");

list.unshift({
id:Date.now(),
phone:t("phone"),
price:getPrice(),
final:finalPrice,
discount:discountVal,
text:result.innerText
});

localStorage.setItem("con",JSON.stringify(list));

discount=false;
document.getElementById("discountBtn").classList.remove("active");

render();
}

function toDone(id){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let done=JSON.parse(localStorage.getItem("done")||"[]");

let item=con.find(x=>x.id==id);
con=con.filter(x=>x.id!=id);
done.unshift(item);

localStorage.setItem("con",JSON.stringify(con));
localStorage.setItem("done",JSON.stringify(done));

render();
}

function del(type,id){
let arr=JSON.parse(localStorage.getItem(type)||"[]");
arr=arr.filter(x=>x.id!=id);
localStorage.setItem(type,JSON.stringify(arr));
render();
}

function render(){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let done=JSON.parse(localStorage.getItem("done")||"[]");

let html1="<h2>未成約</h2>";
con.forEach(x=>{
html1+=`
<div class="card">
${x.phone}<br>
元：${x.price}円<br>
値引後：${x.final}円<br>
<button onclick="alert(\`${x.text}\`)">見積書</button>
<button onclick="toDone(${x.id})">成約</button>
<button onclick="del('con',${x.id})">削除</button>
</div>`;
});

let html2="<h2>成約済</h2>";
let total=0;
done.forEach(x=>{
total+=x.final||x.price;
html2+=`
<div class="card">
${x.phone} ${x.final||x.price}円
<button onclick="alert(\`${x.text}\`)">見積書</button>
<button onclick="del('done',${x.id})">削除</button>
</div>`;
});

document.getElementById("conList").innerHTML=html1;
document.getElementById("doneList").innerHTML=html2;
document.getElementById("total").innerText="売上合計："+total.toLocaleString()+"円";
}

function sendLINE(){
let txt=encodeURIComponent(result.innerText);
window.open("https://line.me/R/msg/text/?"+txt);
}

render();

</script>

</body>
</html>

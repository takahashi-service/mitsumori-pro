<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>見積もりPRO 完全版 v3.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;background:#eef2f5;padding:15px;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input{width:100%;margin:5px 0;padding:8px;}
button{padding:10px;margin-top:5px;width:100%;}
.result{white-space:pre-line;background:#111;color:#0f0;padding:10px;border-radius:10px;}
.checked{opacity:0.5;}
</style>
</head>

<body>

<h1>🚚 見積もりPRO</h1>

<div class="card">
<h2>顧客情報</h2>
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="address" placeholder="住所">

<h2>希望日</h2>
<input type="date" id="date1">
<input type="date" id="date2">
<input type="date" id="date3">
</div>

<div class="card">
<h2>条件</h2>
<input id="distance" type="number" placeholder="距離km">
</div>

<div class="card">
<h2>家財リスト</h2>

<input id="box" type="number" placeholder="ダンボール">

<input id="fridgeSmall" type="number" placeholder="冷蔵庫 小">
<input id="fridgeMedium" type="number" placeholder="冷蔵庫 中">
<input id="fridgeLarge" type="number" placeholder="冷蔵庫 大">

<input id="washerNormal" type="number" placeholder="洗濯機">
<input id="washerDrum" type="number" placeholder="ドラム式">

<input id="tvSmall" type="number" placeholder="テレビ 小">
<input id="tvMedium" type="number" placeholder="テレビ 中">
<input id="tvLarge" type="number" placeholder="テレビ 大">

<input id="cupboardSmall" type="number" placeholder="食器棚 小">
<input id="cupboardMedium" type="number" placeholder="食器棚 中">
<input id="cupboardLarge" type="number" placeholder="食器棚 大">

<input id="bedSingle" type="number" placeholder="ベッド シングル">
<input id="bedSemi" type="number" placeholder="ベッド セミダブル">
<input id="bedDouble" type="number" placeholder="ベッド ダブル">
<input id="bedQueen" type="number" placeholder="ベッド クイーン">
<input id="bedKing" type="number" placeholder="ベッド キング">

<input id="matSingle" type="number" placeholder="マットレス シングル">
<input id="matSemi" type="number" placeholder="マットレス セミダブル">
<input id="matDouble" type="number" placeholder="マットレス ダブル">
<input id="matQueen" type="number" placeholder="マットレス クイーン">
<input id="matKing" type="number" placeholder="マットレス キング">

<input id="tableDining" type="number" placeholder="ダイニングテーブル">
<input id="tableLow" type="number" placeholder="ローテーブル">
<input id="deskGaming" type="number" placeholder="ゲーミングデスク">

<input id="chairGaming" type="number" placeholder="ゲーミングチェア">
<input id="chair" type="number" placeholder="チェア">
<input id="stool" type="number" placeholder="椅子">

<input id="sofa" type="number" placeholder="ソファ">

<input id="bikeSmall" type="number" placeholder="自転車 小">
<input id="bikeLarge" type="number" placeholder="自転車 大">
</div>

<button onclick="toggleDiscount()">即決割引 -5,000円</button>
<button onclick="calc()">計算</button>
<button onclick="printPDF()">PDF作成</button>

<div id="result" class="result"></div>
<div id="printArea"></div>

<hr>
<div id="unList"></div>
<div id="conList"></div>

<script>

let isDiscount=false;

function val(id){return Number(document.getElementById(id).value)||0;}

function getCustomerNo(){
let num=Number(localStorage.getItem("custNo")||0)+1;
localStorage.setItem("custNo",num);
return "C"+String(num).padStart(4,"0");
}

function toggleDiscount(){
isDiscount=!isDiscount;
calc();
}

function calc(){

let customerNo=getCustomerNo();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let date1=document.getElementById("date1").value;
let date2=document.getElementById("date2").value;
let date3=document.getElementById("date3").value;

let distance=val("distance");

// 立米
let volume=
val("box")*0.1+
val("fridgeSmall")*0.3+val("fridgeMedium")*0.5+val("fridgeLarge")*0.8+
val("washerNormal")*0.3+val("washerDrum")*0.6+
val("tvSmall")*0.2+val("tvMedium")*0.3+val("tvLarge")*0.5+
val("cupboardSmall")*0.5+val("cupboardMedium")*0.8+val("cupboardLarge")*1.2+
val("bedSingle")*1.0+val("bedSemi")*1.2+val("bedDouble")*1.4+val("bedQueen")*1.6+val("bedKing")*1.8+
val("matSingle")*0.5+val("matSemi")*0.6+val("matDouble")*0.7+val("matQueen")*0.8+val("matKing")*1.0+
val("tableDining")*1.0+val("tableLow")*0.4+val("deskGaming")*0.8+
val("chairGaming")*0.4+val("chair")*0.3+val("stool")*0.2+
val("sofa")*1.5+
val("bikeSmall")*0.5+val("bikeLarge")*0.8;

let base=30000;
let price=base+(distance*200)+(volume*2000);

// 1000円丸め
price=Math.floor(price/1000)*1000;

// 即決割引
if(isDiscount){price-=5000;}

let text=
"顧客番号："+customerNo+"\n"+
"顧客："+name+"\n\n"+
"金額："+price.toLocaleString()+"円\n"+
"距離："+distance+"km\n"+
"立米："+volume.toFixed(2)+"\n\n"+
"※本日限定";

document.getElementById("result").innerText=text;

// 保存
let un=JSON.parse(localStorage.getItem("un")||"[]");

un.push({
id:Date.now(),
customerNo,
name,
phone,
address,
price,
volume,
distance,
date1,date2,date3,
checked:false,
text
});

localStorage.setItem("un",JSON.stringify(un));

render();
}

function printPDF(){

let text=document.getElementById("result").innerText;
let today=new Date().toLocaleDateString();

printArea.innerHTML=`
<h1>見積書</h1>
<pre>${text}</pre>
<div>見積日：${today}</div>
<div style="text-align:right;">万事屋そうちゃん</div>
`;

window.print();
}

function render(){

let un=JSON.parse(localStorage.getItem("un")||"[]");
let html="<h2>未成約</h2>";

un.forEach(x=>{
html+=`
<div class="card ${x.checked?'checked':''}">
${x.customerNo} ${x.name} ${x.price}円
<button onclick="contract(${x.id})">成約</button>
<button onclick="toggleCheck(${x.id})">確認済み</button>
<button onclick="del(${x.id})">削除</button>
</div>`;
});

document.getElementById("unList").innerHTML=html;
}

function contract(id){

let un=JSON.parse(localStorage.getItem("un")||"[]");
let con=JSON.parse(localStorage.getItem("con")||"[]");

let item=un.find(x=>x.id==id);
un=un.filter(x=>x.id!=id);
con.push(item);

localStorage.setItem("un",JSON.stringify(un));
localStorage.setItem("con",JSON.stringify(con));

render();
renderCon();
}

function renderCon(){

let con=JSON.parse(localStorage.getItem("con")||"[]");
let html="<h2>成約</h2>";

con.forEach(x=>{
html+=`
<div class="card">
${x.customerNo} ${x.name} ${x.price}円
<button onclick="view(${x.id})">見積書</button>
<button onclick="toggleCheckCon(${x.id})">確認済み</button>
<button onclick="delCon(${x.id})">削除</button>
</div>`;
});

document.getElementById("conList").innerHTML=html;
}

function view(id){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let item=con.find(x=>x.id==id);
alert(item.text);
}

function toggleCheck(id){
let un=JSON.parse(localStorage.getItem("un")||"[]");
let item=un.find(x=>x.id==id);
item.checked=!item.checked;
localStorage.setItem("un",JSON.stringify(un));
render();
}

function toggleCheckCon(id){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let item=con.find(x=>x.id==id);
item.checked=!item.checked;
localStorage.setItem("con",JSON.stringify(con));
renderCon();
}

function del(id){
if(!confirm("削除する？"))return;
let un=JSON.parse(localStorage.getItem("un")||"[]");
un=un.filter(x=>x.id!=id);
localStorage.setItem("un",JSON.stringify(un));
render();
}

function delCon(id){
if(!confirm("削除する？"))return;
let con=JSON.parse(localStorage.getItem("con")||"[]");
con=con.filter(x=>x.id!=id);
localStorage.setItem("con",JSON.stringify(con));
renderCon();
}

render();
renderCon();

</script>

</body>
</html>

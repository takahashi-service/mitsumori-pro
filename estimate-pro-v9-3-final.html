<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>estimate-pro-v9-3-final</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;background:#eef2f5;padding:15px;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select{width:100%;margin:5px 0;padding:8px;}
.row{display:flex;gap:5px;}
button{padding:10px;margin-top:5px;width:100%;border:none;border-radius:8px;}
.calc{background:#007bff;color:#fff;}
.save{background:#ffc107;}
.pdf{background:#28a745;color:#fff;}
.line{background:#06c755;color:#fff;}
.del{background:#dc3545;color:#fff;}
.result{white-space:pre-line;background:#000;color:#0f0;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h1>🚚 見積もりPRO V9.3</h1>

<div class="card">
<h2>顧客情報</h2>
<input id="name" placeholder="名前">

<div class="row">
<input id="from" placeholder="積み地">
<button onclick="copyText('from')">コピー</button>
</div>

<div class="row">
<input id="to" placeholder="降ろし地">
<button onclick="copyText('to')">コピー</button>
</div>

<input type="datetime-local" id="schedule">
<button onclick="openCal()">📅カレンダリー予約</button>

<select id="status">
<option>未申込</option>
<option>申込済</option>
<option>成約</option>
</select>
</div>

<div class="card">
<h2>条件</h2>
<input id="distance" type="number" placeholder="距離km">
<select id="season">
<option value="normal">通常</option>
<option value="busy">繁忙期</option>
</select>
</div>

<div class="card">
<h2>家財（完全版）</h2>

<input id="box" type="number" placeholder="ダンボール">

<input id="fridgeSmall" type="number" placeholder="冷蔵庫 小">
<input id="fridgeMedium" type="number" placeholder="冷蔵庫 中">
<input id="fridgeLarge" type="number" placeholder="冷蔵庫 大">

<input id="washer" type="number" placeholder="洗濯機">
<input id="drum" type="number" placeholder="ドラム式">

<input id="tvSmall" type="number" placeholder="テレビ 小">
<input id="tvMedium" type="number" placeholder="テレビ 中">
<input id="tvLarge" type="number" placeholder="テレビ 大">

<input id="sofa2" type="number" placeholder="ソファ 2人掛け">
<input id="sofa3" type="number" placeholder="ソファ 3人掛け">

<input id="bikeM" type="number" placeholder="自転車 中">
<input id="bikeL" type="number" placeholder="自転車 大">

<input id="cupS" type="number" placeholder="食器棚 小">
<input id="cupM" type="number" placeholder="食器棚 中">
<input id="cupL" type="number" placeholder="食器棚 大">

<input id="bedS" type="number" placeholder="ベッド シングル">
<input id="bedSD" type="number" placeholder="ベッド セミダブル">
<input id="bedD" type="number" placeholder="ベッド ダブル">

<input id="matS" type="number" placeholder="マットレス シングル">
<input id="matSD" type="number" placeholder="マットレス セミダブル">
<input id="matD" type="number" placeholder="マットレス ダブル">

<input id="dining" type="number" placeholder="ダイニングテーブル">
<input id="game" type="number" placeholder="ゲーミングチェア">
<input id="hanger" type="number" placeholder="パイプハンガー">
<input id="light" type="number" placeholder="照明">
</div>

<button class="calc" onclick="calc()">計算</button>
<button class="save" onclick="save()">保存</button>
<button class="pdf" onclick="makePDF()">PDF</button>
<button class="line" onclick="sendLINE()">LINE送信</button>
<button class="del" onclick="deleteData()">削除</button>

<div id="result" class="result"></div>

<script>

function v(id){return Number(document.getElementById(id).value)||0;}
function t(id){return document.getElementById(id).value||"";}

function copyText(id){
navigator.clipboard.writeText(t(id));
alert("コピー完了");
}

function openCal(){
window.open("https://calendly.com/alve-takahashi/30min");
}

function market(volume,distance,season){
let min,max;

if(volume<=3){min=25000;max=45000;}
else if(volume<=6){min=40000;max=70000;}
else if(volume<=10){min=70000;max=120000;}
else{min=100000;max=180000;}

min+=distance*120;
max+=distance*180;

if(season==="busy"){
min*=1.3;
max*=1.6;
}

return {min,max};
}

function calc(){

let volume =
v("box")*0.1 +
v("fridgeSmall")*0.6 +   /* ←修正 */
v("fridgeMedium")*1.0 +  /* ←修正 */
v("fridgeLarge")*1.2 +   /* ←修正 */
v("washer")*0.3 +
v("drum")*0.6 +
v("tvSmall")*0.2 +
v("tvMedium")*0.3 +
v("tvLarge")*0.5 +
v("sofa2")*1.2 +
v("sofa3")*1.8 +
v("bikeM")*0.4 +
v("bikeL")*0.6 +
v("cupS")*0.5 +
v("cupM")*0.8 +
v("cupL")*1.2 +
v("bedS")*1.0 +
v("bedSD")*1.2 +
v("bedD")*1.4 +
v("matS")*0.5 +
v("matSD")*0.7 +
v("matD")*1.0 +
v("dining")*1.5 +
v("game")*0.3 +
v("hanger")*0.3 +
v("light")*0.2;

let distance=v("distance");
let trips=Math.ceil(volume/8);

let price=(30000 + distance*200 + volume*2000)*trips;
price=Math.floor(price/1000)*1000;

let m=market(volume,distance,document.getElementById("season").value);

let eval="";
if(price<m.min) eval="安い";
else if(price>m.max) eval="高め";
else eval="適正";

let today=new Date().toLocaleDateString();

let items =
"ダンボール:"+v("box")+"\n"+
"冷蔵庫 小:"+v("fridgeSmall")+"\n"+
"冷蔵庫 中:"+v("fridgeMedium")+"\n"+
"冷蔵庫 大:"+v("fridgeLarge")+"\n"+
"洗濯機:"+v("washer")+"\n"+
"ドラム式:"+v("drum")+"\n"+
"テレビ 小:"+v("tvSmall")+"\n"+
"テレビ 中:"+v("tvMedium")+"\n"+
"テレビ 大:"+v("tvLarge")+"\n"+
"ソファ2人:"+v("sofa2")+"\n"+
"ソファ3人:"+v("sofa3")+"\n"+
"自転車 中:"+v("bikeM")+"\n"+
"自転車 大:"+v("bikeL")+"\n"+
"食器棚 小:"+v("cupS")+"\n"+
"食器棚 中:"+v("cupM")+"\n"+
"食器棚 大:"+v("cupL")+"\n"+
"ベッド S:"+v("bedS")+"\n"+
"ベッド SD:"+v("bedSD")+"\n"+
"ベッド D:"+v("bedD")+"\n"+
"マットレス S:"+v("matS")+"\n"+
"マットレス SD:"+v("matSD")+"\n"+
"マットレス D:"+v("matD")+"\n"+
"ダイニング:"+v("dining")+"\n"+
"ゲーミングチェア:"+v("game")+"\n"+
"ハンガー:"+v("hanger")+"\n"+
"照明:"+v("light");

let text =
"【見積書】\n"+
"作成日:"+today+"\n\n"+
"万事屋そうちゃん\n担当者名:髙橋 爽\n\n"+
"名前:"+t("name")+"\n"+
"積み地:"+t("from")+"\n"+
"降ろし地:"+t("to")+"\n\n"+
"距離:"+distance+"km\n"+
"立米:"+volume.toFixed(2)+"\n"+
"回数:"+trips+"\n\n"+
"金額:"+price.toLocaleString()+"円\n"+
"相場:"+Math.floor(m.min)+"〜"+Math.floor(m.max)+"円("+eval+")\n\n"+
"【家財】\n"+items+"\n\n"+
"状態:"+t("status")+"\n"+
"予約:"+t("schedule")+"\n\n"+
"▼予約\nhttps://calendly.com/alve-takahashi/30min";

document.getElementById("result").innerText=text;
}

function save(){
localStorage.setItem("estimate_v93",document.getElementById("result").innerText);
alert("保存OK");
}

function deleteData(){
localStorage.removeItem("estimate_v93");
alert("削除OK");
}

function makePDF(){
let w=window.open("");
w.document.write(document.getElementById("result").innerText.replace(/\n/g,"<br>"));
w.print();
}

function sendLINE(){
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(document.getElementById("result").innerText));
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>見積もりPRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:-apple-system;background:#eef2f5;margin:0;padding:15px;}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
h1{font-size:20px;}
h2{font-size:16px;border-left:4px solid #007bff;padding-left:8px;}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
.row{display:flex;gap:10px;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;margin-top:10px;}
.calc{background:#007bff;color:#fff;}
.pdf{background:#28a745;color:#fff;}
.resultBox{background:#111;color:#0f0;padding:15px;border-radius:10px;white-space:pre-line;font-family:monospace;}
.print-area{background:#fff;padding:20px;}
@media print{
body *{visibility:hidden;}
.print-area,.print-area *{visibility:visible;}
.print-area{position:absolute;top:0;left:0;width:100%;}
}
</style>
</head>

<body>

<h1>🚚 見積もりPRO</h1>

<div class="card">
<h2>基本情報</h2>
<input type="number" id="distance" placeholder="距離（km）">
<input type="number" id="workers" placeholder="作業人数">
<input type="number" id="highway" placeholder="高速代（片道）">
</div>

<div class="card">
<h2>家財</h2>
<div class="row">
<input type="number" id="fridgeSmall" placeholder="冷蔵庫 小">
<input type="number" id="fridgeMedium" placeholder="冷蔵庫 中">
<input type="number" id="fridgeLarge" placeholder="冷蔵庫 大">
</div>
<div class="row">
<input type="number" id="washerNormal" placeholder="洗濯機">
<input type="number" id="washerDrum" placeholder="ドラム">
</div>
<div class="row">
<input type="number" id="bed" placeholder="ベッド">
<input type="number" id="sofa" placeholder="ソファ">
<input type="number" id="box" placeholder="ダンボール">
</div>
</div>

<div class="card">
<label><input type="checkbox" id="busy"> 繁忙期</label>
<label><input type="checkbox" id="discount"> 即決割引</label>
</div>

<button class="calc" onclick="calc()">計算</button>
<button class="pdf" onclick="printPDF()">PDF</button>

<div class="card resultBox" id="result"></div>
<div id="printArea" class="print-area"></div>

<script>

function num(v){return Math.max(0,Number(v)||0);}

function getSpace(v){
if(v<=3)return"G";if(v<=5)return"F";if(v<=10)return"E";if(v<=15)return"D";
if(v<=20)return"C";if(v<=25)return"CL";if(v<=30)return"B";if(v<=35)return"A";
if(v<=40)return"AF";if(v<=45)return"AE";if(v<=50)return"AD";if(v<=55)return"AC";
if(v<=60)return"ACL";if(v<=65)return"AB";if(v<=70)return"AA";if(v<=75)return"AAF";
if(v<=80)return"AAE";if(v<=85)return"AAD";if(v<=90)return"AAC";if(v<=95)return"AACL";
if(v<=100)return"AAB";if(v<=105)return"AAA";
return"X";
}

function getMinPrice(space){
const base={G:15000,F:20000,E:30000,D:40000,C:50000,CL:60000,B:70000,A:80000};
if(base[space]) return base[space];
let order=["AF","AE","AD","AC","ACL","AB","AA","AAF","AAE","AAD","AAC","AACL","AAB","AAA"];
let i=order.indexOf(space);
if(i>=0) return 90000+(i*10000);
return 150000;
}

function calc(){

let dist=num(distance.value);
let workerInput=num(workers.value);
let highwayInput=num(document.getElementById("highway").value || 0);

// 家財
let volume=
num(fridgeSmall.value)*0.3+
num(fridgeMedium.value)*0.5+
num(fridgeLarge.value)*0.8+
num(washerNormal.value)*0.3+
num(washerDrum.value)*0.6+
num(bed.value)*1.2+
num(sofa.value)*1.5+
num(box.value)*0.1;

volume = Number(volume.toFixed(2));

// 入力チェック
if(volume===0){
  result.innerText="⚠️ 荷物を入力してください";
  return;
}

if(workerInput===0){
  result.innerText="⚠️ 人数を入力してください";
  return;
}

let worker=workerInput;
let space=getSpace(volume);

// 大型案件
if(space==="X"){
  result.innerText="⚠️ 大型案件のため別見積もり";
  printArea.innerHTML="<h2>大型案件のため別見積もり</h2>";
  return;
}

// 回数
let trips=Math.max(1,Math.ceil(volume/10));
let totalDistance=dist*2*trips;

// 売上
let unit=volume<3?12000:volume<8?10000:8000;
let sales=(dist*1000)+(worker*8000)+(volume*unit);

// 繁忙期
if(busy.checked) sales*=1.2;

// 最低料金
let minPrice=getMinPrice(space);
if(sales<minPrice) sales=minPrice;

// 割引
let discounted=false;
if(discount.checked){
  sales-=3000;
  discounted=true;
}
if(sales<minPrice){
  sales=minPrice;
  discounted=false;
}

// 税
let tax=Math.ceil(sales*0.1);
let total=sales+tax;

// 経費
let fuel=(totalDistance/5)*150;
let highwayCost=highwayInput*2*trips;

let workHours=(volume*0.5)+(totalDistance/40);
if(workHours<3) workHours=3;

let labor=worker*workHours*1500;
let costTotal=fuel+highwayCost+labor;

let profit=sales-costTotal;
let rate=sales>0?(profit/sales*100):0;

// 赤字
if(profit<0){
  let ngMsg="⚠️ 赤字のため受注NG";
  result.innerText=ngMsg;
  printArea.innerHTML="<h2>"+ngMsg+"</h2>";
  return;
}

// 表示
let busyText=busy.checked?"【繁忙期料金】\n":"";
let discountText=discounted?"【即決割引適用】\n":"";

let text=
busyText+
discountText+
"税抜："+Math.ceil(sales).toLocaleString()+"円\n"+
"税込："+Math.ceil(total).toLocaleString()+"円\n\n"+
"荷物："+volume.toFixed(2)+"㎥（"+space+"）\n"+
"回数："+trips+"回 / 距離："+Math.ceil(totalDistance)+"km\n\n"+
"経費："+Math.ceil(costTotal).toLocaleString()+"円\n"+
"利益："+Math.ceil(profit).toLocaleString()+"円\n"+
"利益率："+rate.toFixed(1)+"%";

// 警告
let warn="";
if(profit<10000){
  warn="⚠️ 薄利案件";
}
if(rate<20){
  warn+=(warn?"\n":"")+"⚠️ 利益率低い（要注意）";
}

// 出力
result.innerText=warn?text+"\n\n"+warn:text;

// PDF
printArea.innerHTML=
"<h2>見積書</h2>"+
"<pre>"+(warn?text+"\n\n"+warn:text)+"</pre>";

}

function printPDF(){
calc();
window.print();
}

</script>

</body>
</html>

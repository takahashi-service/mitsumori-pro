<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>見積もりPRO 完全版v7</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#eef2f5;padding:15px;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select{width:100%;margin:5px 0;padding:8px;}
button{padding:12px;margin-top:8px;width:100%;border:none;border-radius:8px;}
.calc{background:#007bff;color:#fff;}
.save{background:#ffc107;}
.pdf{background:#28a745;color:#fff;}
.discount{background:#dc3545;color:#fff;}
.result{white-space:pre-line;background:#111;color:#0f0;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h1>🚚 見積もりPRO v7</h1>

<div class="card">
<h2>顧客情報</h2>
<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="address" placeholder="住所">

<h2>希望日</h2>
<input type="date" id="date1">
<input type="date" id="date2">
<input type="date" id="date3">
</div>

<div class="card">
<h2>条件</h2>
<input id="distance" type="number" placeholder="距離km">
<input id="highway" type="number" placeholder="高速代">

<select id="planOverride">
<option value="">自動判定</option>
<option value="small">小口限定</option>
<option value="smallPlus">小口拡張</option>
<option value="normal">通常</option>
</select>
</div>

<div class="card">
<h2>家財（立米）</h2>
<input id="box" type="number" placeholder="ダンボール">
<input id="fridgeSmall" type="number" placeholder="冷蔵庫 小">
<input id="fridgeMedium" type="number" placeholder="冷蔵庫 中">
<input id="fridgeLarge" type="number" placeholder="冷蔵庫 大">
<input id="washerNormal" type="number" placeholder="洗濯機">
<input id="washerDrum" type="number" placeholder="ドラム式">
<input id="tvSmall" type="number" placeholder="テレビ 小">
<input id="tvMedium" type="number" placeholder="テレビ 中">
<input id="tvLarge" type="number" placeholder="テレビ 大">
<input id="cupboardSmall" type="number" placeholder="食器棚 小">
<input id="cupboardMedium" type="number" placeholder="食器棚 中">
<input id="cupboardLarge" type="number" placeholder="食器棚 大">
<input id="bedSingle" type="number" placeholder="ベッド シングル">
<input id="bedSemi" type="number" placeholder="ベッド セミダブル">
<input id="bedDouble" type="number" placeholder="ベッド ダブル">
<input id="bedQueen" type="number" placeholder="ベッド クイーン">
<input id="bedKing" type="number" placeholder="ベッド キング">
<input id="sofa" type="number" placeholder="ソファ">
<input id="bikeSmall" type="number" placeholder="自転車 小">
<input id="bikeLarge" type="number" placeholder="自転車 大">
</div>

<button class="discount" onclick="toggleDiscount()">即決割引 -5000円</button>
<button class="calc" onclick="calc()">計算</button>
<button class="save" onclick="saveData()">保存</button>
<button class="pdf" onclick="printPDF()">PDF</button>

<div id="result" class="result"></div>

<hr>
<div id="unList"></div>
<div id="conList"></div>
<div id="doneList"></div>
<div id="totalSales"></div>

<script>

let isDiscount=false;
function toggleDiscount(){isDiscount=!isDiscount;calc();}
function val(id){return Number(document.getElementById(id).value)||0;}
function valText(id){return document.getElementById(id).value||"";}

// ===== 計算
function calc(){

let name=valText("name");
let phone=valText("phone");
let address=valText("address");
let date1=valText("date1");
let date2=valText("date2");
let date3=valText("date3");

let distance=val("distance");
let highway=val("highway");

let volume =
val("box")*0.1 +
val("fridgeSmall")*0.3 + val("fridgeMedium")*0.5 + val("fridgeLarge")*0.8 +
val("washerNormal")*0.3 + val("washerDrum")*0.6 +
val("tvSmall")*0.2 + val("tvMedium")*0.3 + val("tvLarge")*0.5 +
val("cupboardSmall")*0.5 + val("cupboardMedium")*0.8 + val("cupboardLarge")*1.2 +
val("bedSingle")*1.0 + val("bedSemi")*1.2 + val("bedDouble")*1.4 +
val("bedQueen")*1.6 + val("bedKing")*1.8 +
val("sofa")*1.5 +
val("bikeSmall")*0.5 + val("bikeLarge")*0.8;

// ===== プラン自動
let plan="通常";
let price=30000+(distance*200)+(volume*2000)+highway;

if(volume<=1){plan="小口限定"; price=25000;}
else if(volume<=3){plan="小口拡張"; price+=10000;}

// 手動上書き
let override=document.getElementById("planOverride").value;
if(override==="small"){plan="小口限定"; price=25000;}
if(override==="smallPlus"){plan="小口拡張"; price+=10000;}
if(override==="normal"){plan="通常";}

price=Math.floor(price/1000)*1000;
if(isDiscount) price-=5000;

let id=Date.now();
let today=new Date().toLocaleDateString();

// ===== 見積書（完全版）
let text=
"【見積書】\n\n"+
"顧客番号："+id+"\n"+
"名前："+name+"\n"+
"電話："+phone+"\n"+
"住所："+address+"\n\n"+
"希望日："+date1+" / "+date2+" / "+date3+"\n\n"+
"金額："+price.toLocaleString()+"円\n"+
"距離："+distance+"km\n"+
"立米："+volume.toFixed(2)+"㎥\n"+
"プラン："+plan+"\n\n"+
"見積日："+today;

result.innerText=text;
}

// ===== PDF
function printPDF(){
let w=window.open("");
function printPDF(){

let w=window.open("");

let html = `
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;padding:20px;}
.title{font-size:22px;font-weight:bold;margin-bottom:10px;}
.box{border:1px solid #000;padding:10px;margin-bottom:10px;}
.total{font-size:20px;font-weight:bold;color:red;}
</style>
</head>

<body>

<div class="title">見積書</div>

<div class="box">
屋号：万事屋そうちゃん<br>
</div>

<div class="box">
顧客名：${valText("name")}<br>
電話：${valText("phone")}<br>
住所：${valText("address")}<br>
希望日：${valText("date1")} / ${valText("date2")} / ${valText("date3")}
</div>

<div class="box">
距離：${val("distance")} km<br>
立米：${document.getElementById("result").innerText.match(/立米：(.*)m/)?RegExp.$1:""} ㎥
</div>

<div class="box total">
合計：${getPrice().toLocaleString()} 円（税込）
</div>

<div style="margin-top:20px;">
※即決割引あり<br>
※高速代別途
</div>

</body>
</html>
`;

w.document.write(html);
w.document.close();
w.print();
}
}

// ===== 保存（電話上書き）
function saveData(){

let phone=valText("phone");
if(!phone){alert("電話必須");return;}

let con=JSON.parse(localStorage.getItem("con")||"[]");

con=con.filter(x=>x.phone!==phone);

con.unshift({
id:Date.now(),
phone,
name:valText("name"),
price:getPrice(),
text:result.innerText
});

localStorage.setItem("con", JSON.stringify(con));
renderCon();
renderDone();
}

function getPrice(){
let m=result.innerText.match(/金額：(.*)円/);
return m?Number(m[1].replace(/,/g,"")):0;
}

// ===== 共通 view
function view(id){
let all=[...JSON.parse(localStorage.getItem("un")||"[]"),
...JSON.parse(localStorage.getItem("con")||"[]"),
...JSON.parse(localStorage.getItem("done")||"[]")];

let item=all.find(x=>x.id==id);
alert(item.text);
}

// ===== 削除
function del(type,id){
let arr=JSON.parse(localStorage.getItem(type)||"[]");
arr=arr.filter(x=>x.id!=id);
localStorage.setItem(type,JSON.stringify(arr));
renderCon();
renderDone();
}

// ===== 申込
function renderCon(){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let html="<h2>申込</h2>";
con.forEach(x=>{
html+=`<div class="card">
${x.phone} ${x.price}円
<button onclick="view(${x.id})">見積書</button>
<button onclick="toDone(${x.id})">成約</button>
<button onclick="del('con',${x.id})">削除</button>
</div>`;
});
conList.innerHTML=html;
}

// ===== 成約
function renderDone(){
let done=JSON.parse(localStorage.getItem("done")||"[]");
let total=0;
let html="<h2>成約済</h2>";
done.forEach(x=>{
total+=x.price;
html+=`<div class="card">
${x.phone} ${x.price}円
<button onclick="view(${x.id})">見積書</button>
<button onclick="del('done',${x.id})">削除</button>
</div>`;
});
doneList.innerHTML=html;
totalSales.innerText="売上合計："+total.toLocaleString()+"円";
}

// ===== 移動
function toDone(id){
let con=JSON.parse(localStorage.getItem("con")||"[]");
let done=JSON.parse(localStorage.getItem("done")||"[]");
let item=con.find(x=>x.id==id);
con=con.filter(x=>x.id!=id);
done.unshift(item);
localStorage.setItem("con",JSON.stringify(con));
localStorage.setItem("done",JSON.stringify(done));
renderCon();renderDone();
}

render();
renderCon();
renderDone();

</script>

</body>
</html>

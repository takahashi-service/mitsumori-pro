<div class="card">

<button onclick="calc()">見積もり計算</button>

<p id="plan_v3"></p>
<p id="market_v3"></p>
<p id="detail_v3"></p>
<p id="talk_v3"></p>

</div>

<script>

// ===== 新calc（料金ロジック完全版）=====
(function(){

  window.calc = function(){

    // 入力取得
    let m3 = Number(document.getElementById("totalM3").textContent) || 0;
    let distance = Number(document.getElementById("distance").value) || 0;
    let stairs = Number(document.getElementById("stairs").value) || 0;
    let busy = Number(document.getElementById("busy").value) || 0;
    let highway = Number(document.getElementById("highway").value) || 0;

    // ===== 単価テーブル =====
    function getBasePrice(v){
      if(v <= 1) return 30000;
      if(v <= 3) return 45000;
      if(v <= 5) return 60000;
      return 0;
    }

    // ===== 基本料金 =====
    let basePrice = 0;

    if(m3 <= 5){
      basePrice = getBasePrice(m3);
    }else{
      let first = 5;
      let rest = m3 - 5;

      let firstPrice = getBasePrice(first);
      let restPrice = getBasePrice(rest);

      basePrice = firstPrice + restPrice - 10000;
    }

    // ===== 距離最適化（弱め設定）=====
    let distanceFee = distance * 150; // ←調整済

    // ===== 高速 =====
    let highwayFee = highway ? distance * 30 : 0;

    // ===== 合計（税抜）=====
    let subtotal = basePrice + distanceFee + stairs + busy + highwayFee;

    // ===== 最低保証 =====
    if(subtotal < 20000) subtotal = 20000;

    // ===== 税込み =====
    let tax = Math.floor(subtotal * 0.1);
    let total = subtotal + tax;

    // ===== 相場 =====
    // ===== 相場（リアル立米レンジ）=====
let marketLow = 0;
let marketHigh = 0;

if(m3 <= 1){
  marketLow = 30000;
  marketHigh = 50000;
}
else if(m3 <= 3){
  marketLow = 50000;
  marketHigh = 80000;
}
else if(m3 <= 5){
  marketLow = 80000;
  marketHigh = 120000;
}
else if(m3 <= 8){
  marketLow = 100000;
  marketHigh = 180000;
}
else{
  marketLow = 150000;
  marketHigh = 250000;
}

// ===== プラン =====
let planName = "";

if(m3 <= 1){
  planName = "小口破格プラン（最安優先）";
}
else if(m3 <= 3){
  planName = "小口特価プラン（バランス型）";
}
else{
  planName = "標準プラン（通常価格）";
}

// ===== 営業トーク =====
let talk = "";

if(planName.includes("破格")){
  talk = "今回かなり荷物が少ないため、特別に破格でご案内しています。この条件はなかなか出ません。";
}
else if(planName.includes("特価")){
  talk = "通常より抑えた特価でご案内しています。相場と比べても安いラインです。";
}
else{
  talk = "内容的には適正価格ですが、この条件としてはかなり良い内容になっています。";
}

if(busy > 0){
  talk += " 繁忙期で全体的に料金が上がる中でも、できるだけ抑えています。";
}

if(distance > 30){
  talk += " 距離がありますが、その分もかなり抑えてあります。";
}

if(stairs > 0){
  talk += " 階段作業も含めた料金としては、かなり良心的な設定です。";
}

talk += " 本日中にご決定いただければ、この金額で確定可能です。";

// ===== 表示 =====
document.getElementById("result_v3").innerText =
  "提示価格：¥" + total.toLocaleString() + "（税込）";

document.getElementById("plan_v3").innerText =
  "適用プラン：" + planName + "（基本料金¥" + basePrice.toLocaleString() + "）";

document.getElementById("talk_v3").innerText =
  "営業トーク：" + talk;

document.getElementById("market_v3").innerText =
  "相場目安：¥" + marketLow.toLocaleString() + "〜¥" + marketHigh.toLocaleString();

document.getElementById("detail_v3").innerText =
  "内訳（税抜）：基本¥" + basePrice +
  " ＋ 距離¥" + distanceFee +
  " ＋ 階段¥" + stairs +
  " ＋ 繁忙期¥" + busy +
  " ＋ 高速¥" + highwayFee;
  };

})();

</script>

<!-- ===== ④：見積書・即決割引・カレンダリー・LINE ===== -->

<div class="card">
<h3>見積書</h3>

<button onclick="createEstimate()">見積書作成</button>

<label>即決割引（最大¥10,000）</label>
<input id="discount" type="number" placeholder="例：5000">

<p id="estimate"></p>

<button onclick="sendLINE()">LINE送信</button>
<button onclick="openCalendly()">日程調整（カレンダリー）</button>

</div>

<script>

// 見積書作成
function createEstimate(){

  let name = document.getElementById("name").value;
  let tel = document.getElementById("tel").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  let d1 = document.getElementById("date1").value;
  let d2 = document.getElementById("date2").value;
  let d3 = document.getElementById("date3").value;

  let discount = Number(document.getElementById("discount").value) || 0;
  if(discount > 10000) discount = 10000;

  let priceText = document.getElementById("result_v3").innerText;
  let price = Number(priceText.replace(/[^0-9]/g, ""));

  let finalPrice = price - discount;

  let today = new Date().toLocaleDateString();

  let text =
`【見積書】

屋号：万事屋そうちゃん
担当：髙橋 爽
作成日：${today}

■お客様情報
名前：${name}
TEL：${tel}

■引越し内容
積み地：${from}
降ろし地：${to}

希望日：
①${d1}
②${d2}
③${d3}

■料金
通常：¥${price}
即決割引：-¥${discount}
最終金額：¥${finalPrice}

※本日中のご決定で割引適用となります。`;

  document.getElementById("estimate").innerText = text;
}

// LINE送信
function sendLINE(){

  let text = document.getElementById("estimate").innerText;

  if(!text){
    alert("先に見積書を作成してください");
    return;
  }

  let url = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
  window.open(url);
}

// カレンダリー
function openCalendly(){
  window.open("https://calendly.com/alve-takahashi/30min");
}

</script>

// 案件保存
function saveCase(){

  let text = document.getElementById("estimate").innerText;

  if(!text){
    alert("見積書を作成してください");
    return;
  }

  let id = Date.now();

let name = document.getElementById("name").value;

let obj = {
  id:id,
  text:text,
  name:name,
  status:"new"
};

cases.push(obj);
render();
}

// 描画
function render(){

  document.getElementById("list_new").innerHTML = "";
  document.getElementById("list_sent").innerHTML = "";
  document.getElementById("list_follow").innerHTML = "";
  document.getElementById("list_done").innerHTML = "";

  let total = cases.length;
  let done = 0;

  cases.forEach(c => {

    let li = document.createElement("li");
    li.innerText = c.text;

    // ボタン群
    if(c.status === "new"){

      let sendBtn = document.createElement("button");
      sendBtn.innerText = "見積送付";
      sendBtn.onclick = () => {
        c.status = "sent";
        render();
      };

      li.appendChild(sendBtn);
      document.getElementById("list_new").appendChild(li);
    }

    else if(c.status === "sent"){

      let followBtn = document.createElement("button");
      followBtn.innerText = "追撃";
      followBtn.onclick = () => {

  let msg = `${c.name}様

お世話になっております！
先日お見積りをお送りさせていただいた件ですが、その後いかがでしょうか？

現在ご予約が埋まりやすくなっておりますので、
お早めのご検討をおすすめしております。

ご不明点などあればお気軽にご連絡ください！`;

  let url = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);

  // 先に開く（重要）
  window.open(url);

  // ステータス変更
  c.status = "follow";

  render();
};
li.appendChild(followBtn);
document.getElementById("list_sent").appendChild(li);
}

    else if(c.status === "follow"){

      let doneBtn = document.createElement("button");
      doneBtn.innerText = "成約";
      doneBtn.onclick = () => {
        c.status = "done";
        addSale(c.text);
        render();
      };

      let delBtn = document.createElement("button");
delBtn.innerText = "削除";

delBtn.onclick = () => {
  if(confirm(`${c.name} を削除する？`)){
    cases = cases.filter(x => x.id !== c.id);
    render();
  }
};

      li.appendChild(doneBtn);
      li.appendChild(delBtn);

      document.getElementById("list_follow").appendChild(li);
    }

  });

  // 成約率
  let rate = total ? Math.floor((done / total) * 100) : 0;
  document.getElementById("rate").innerText = rate;

  updateProfit();
}

// 売上追加
function addSale(text){

  let normalized = text.replace(/\r\n/g, "\n");
  let lines = normalized.split("\n");

  let line = lines.find(l => l.trim().startsWith("最終金額"));

  if(!line) return;

  let match = line.match(/¥([\d,]+)/);
if(!match) return;

let price = Number(match[1].replace(/,/g, ""));
  sales += price;

  document.getElementById("totalSales").innerText =
    sales.toLocaleString();
}
  function copyText(id){
  let val = document.getElementById(id).value;
  navigator.clipboard.writeText(val);
  alert("コピーしました");
}

// 経費追加
function addExpense(){

  let div = document.createElement("div");

  let input = document.createElement("input");
  input.placeholder = "金額";

  input.oninput = updateProfit;

  div.appendChild(input);
  document.getElementById("expenseList").appendChild(div);

  expenses.push(input);
}

// 利益計算
function updateProfit(){

  let totalExpense = 0;

  expenses.forEach(e=>{
    totalExpense += Number(e.value) || 0;
  });

  document.getElementById("totalExpense").innerText = totalExpense;

  let profit = sales - totalExpense;
  document.getElementById("profit").innerText = profit;
}

</script>

<!-- ===== ⑥：PDF・スプレッドシート連携・最終仕上げ ===== -->

<div class="card">
<h3>外部連携・保存</h3>

<button onclick="downloadPDF()">PDF保存</button>
<button onclick="sendToSheetFromUI()">スプレッドシート保存</button>

</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// ===== PDF保存 =====
function downloadPDF(){

  let text = document.getElementById("estimate").innerText;
  if(!text){
    alert("先に見積書を作成してください");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("見積書", 90, 15);

  doc.setFontSize(10);
  doc.text("万事屋そうちゃん", 10, 25);
  doc.text("担当：髙橋 爽", 10, 30);

  doc.setFontSize(12);

  let lines = doc.splitTextToSize(text, 180);
  doc.text(lines, 10, 50);

  // 枠
  doc.rect(5, 5, 200, 287);

  doc.save("見積書.pdf");
}

// ===== スプレッドシート送信 =====
function sendToSheetFromUI(){

  let name = document.getElementById("name").value;
  let tel = document.getElementById("tel").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  let priceText = document.getElementById("result_v3").innerText;
  let price = Number(priceText.replace(/[^0-9]/g, ""));

  let data = {
    name:name,
    tel:tel,
    from:from,
    to:to,
    price:price
  };

  sendToSheet(data);
}

// ===== 実送信 =====
function sendToSheet(data){

  fetch("https://script.google.com/macros/s/AKfycbyvgCDXeJFmMws52QxeNmx-VM8WkSKCyUYLsZQY_Lfei_6Y7AaL74HUuafcb9eli2V_/exec",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res=>res.text())
  .then(res=>{
    alert("スプレッドシート保存完了");
  })
  .catch(err=>{
    alert("送信失敗");
  });

}

// ===== バグ防止①：calc未実行対策 =====
(function(){

  let btn = document.querySelector("button[onclick='createEstimate()']");
  if(btn){
    btn.addEventListener("click", function(){

      if(!document.getElementById("result_v3").innerText){
        alert("先に見積もり計算をしてください");
        throw new Error("calc未実行");
      }

    });
  }

})();

// ===== バグ防止②：割引暴走防止 =====
(function(){

  let input = document.getElementById("discount");

  if(input){
    input.addEventListener("input", function(){

      if(this.value > 10000){
        this.value = 10000;
      }

      if(this.value < 0){
        this.value = 0;
      }

    });
  }

})();

// ===== バグ防止③：数値未入力対策 =====
(function(){

  let inputs = ["distance"];

  inputs.forEach(id=>{
    let el = document.getElementById(id);
    if(el){
      el.addEventListener("input", function(){
        if(this.value < 0){
          this.value = 0;
        }
      });
    }
  });

})();

function updateM3(){

  let total = 0;

  document.querySelectorAll(".item").forEach(row=>{

    let check = row.querySelector("input[type='checkbox']");
    let qty = row.querySelector("input[type='number']");

    if(!check) return;
    
    if(check.checked){
      total += Number(check.dataset.m3) * (Number(qty.value) || 1);
    }

  });

  document.getElementById("totalM3").innerText = total.toFixed(2);
  document.getElementById("m3").value = total.toFixed(2);
}

// ＋−ボタン
function changeQty(btn, num){

  let input = btn.parentElement.querySelector("input[type='number']");
  let val = Number(input.value) + num;

  if(val < 1) val = 1;

  input.value = val;

  updateM3();
}

// イベント
window.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".item input").forEach(el=>{
    el.addEventListener("change", updateM3);
    el.addEventListener("input", updateM3);
  });
});

</script>
